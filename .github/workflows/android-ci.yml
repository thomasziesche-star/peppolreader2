name: Android CI

# Build + unit tests on every PR and on pushes to main / release branches.
on:
  pull_request:
  push:
    branches:
      - main
      - 'release/**'

# Only one run per branch/PR at a time; a newer push cancels the older, still-running one.
concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    # Hard ceiling so a hung test can never occupy a runner indefinitely.
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # gradle.properties pins a local Windows JDK path (org.gradle.java.home) for the dev
      # machine; it doesn't exist on the Linux runner, so drop it here and let Gradle use the
      # JDK from setup-java (JAVA_HOME). Only affects the checkout on the runner.
      - name: Use runner JDK (strip local java.home)
        run: sed -i '/^org\.gradle\.java\.home=/d' gradle.properties

      # Robolectric downloads its android-all runtime jar into ~/.m2 on first use; that isn't
      # covered by the Gradle cache, so persist it separately to avoid re-downloading each run.
      - name: Cache Robolectric runtime
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/robolectric
          key: robolectric-${{ runner.os }}-sdk33

      - name: Unit tests
        run: ./gradlew --no-daemon testDebugUnitTest

      - name: Assemble debug APK
        run: ./gradlew --no-daemon assembleDebug

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: app/build/reports/tests/testDebugUnitTest
          if-no-files-found: ignore
